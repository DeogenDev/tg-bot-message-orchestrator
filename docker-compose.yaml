services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE__DATABASE:-tg_bot}
      POSTGRES_USER: ${DATABASE__USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE__USER:-postgres} -d ${DATABASE__DATABASE:-tg_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BOT__TOKEN: ${BOT__TOKEN:-}
      BOT__ALLOWED_USERS: ${BOT__ALLOWED_USERS:-[]}
      DATABASE__HOST: postgres
      DATABASE__PORT: 5432
      DATABASE__USER: ${DATABASE__USER:-postgres}
      DATABASE__PASSWORD: ${DATABASE__PASSWORD:-postgres}
      DATABASE__DATABASE: ${DATABASE__DATABASE:-tg_bot}
    command: ["./docker-entrypoint.sh"]

volumes:
  postgres_data:
